<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>HOME</title>
</head>
<body>
  <h3>Home</h3>
  <th:block th:switch="${session.login == null}">
    <th:block th:case=true>
      <button type="button" id="btn-login">LOGIN</button>
      <button type="button" id="btn-join">JOIN</button>
    </th:block>
    <th:block th:case=false>
      <button type="button" id="btn-member">MEMBER</button>
      <button type="button" id="btn-logout">LOGOUT</button>
    </th:block>
  </th:block>

  <!-- Javascript -->
  <script>
    // 로그인 페이지로 이동
    const btnLogin = document.getElementById('btn-login');
    btnLogin.addEventListener('click', () => {
      location.href = '/login';
    });

    // 회원가입 페이지로 이동
    const btnJoin = document.getElementById('btn-join');
    btnJoin.addEventListener('click', () => {
      location.href = '/member/add';
    });

    // 회원목록 페이지로 이동
    const btnMember = document.getElementById('btn-member');
    btnMember.addEventListener('click', () => {
      location.href = '/member/list';
    });
  </script>
</body>
</html>
